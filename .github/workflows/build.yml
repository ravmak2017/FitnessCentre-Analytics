name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    name: Compile-check all modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Byte-compile every module
        run: |
          python -m compileall -q .
      - name: Import smoke test (no Streamlit runtime)
        run: |
          python -c "
          import analyzer, anomaly_detector, data_sources, month_context
          import pnl_reader, membership_reader, year_analyzer
          import prompts, qa_context, output_paths, pdf_export
          print('All non-Streamlit modules import cleanly.')
          "
